name: Push to NuGet

on:
  workflow_run:
    workflows: ["Pack & Create Release"]   # ← must match File 1's `name:` exactly
    types: [completed]

jobs:
  approve-and-push:
    runs-on: ubuntu-latest
    # only run if the release workflow actually succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: nuget-production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download .nupkg from release
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./nupkg
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
